name: 💡 Feature Request
description: Suggest a new feature or improvement for EnginAI
labels: ["enhancement"]
assignees:
  - ElioNeto
body:
  - type: markdown
    attributes:
      value: |
        Have an idea that would make EnginAI better? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this solve? What's missing today?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or other solutions you've considered?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI / UX
        - PlannerAgent
        - CoderAgent
        - TesterAgent
        - ScaffolderService
        - RepoManager / Git
        - ModelRouter / LLM
        - Templates
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
